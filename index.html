<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Unhandled Error Handler -->
    <script>
      (function() {
        function showFatalError(message, stack) {
          function insert() {
            var errorDiv = document.getElementById('fatal-error-overlay');
            if (!errorDiv) {
              errorDiv = document.createElement('div');
              errorDiv.id = 'fatal-error-overlay';
              errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fee2e2;border-bottom:2px solid #ef4444;color:#991b1b;font-family:monospace;padding:15px;z-index:9999999;font-size:13px;white-space:pre-wrap;box-shadow:0 4px 6px rgba(0,0,0,0.1);max-height:50vh;overflow-y:auto;';
              document.body.insertBefore(errorDiv, document.body.firstChild);
            }
            errorDiv.innerHTML = '<h3 style="margin:0 0 5px 0;font-size:14px;color:#dc2626;">🚨 Erro de Execução Detectado:</h3>' + 
              '<p style="font-weight:bold;margin:5px 0;font-size:12px;">' + message + '</p>' +
              '<pre style="font-size:10px;background:#fff;padding:8px;border:1px solid #fee2e2;overflow:auto;margin:5px 0 0 0;">' + (stack || 'Sem rastreamento de pilha') + '</pre>';
          }
          if (document.body) {
            insert();
          } else {
            document.addEventListener('DOMContentLoaded', insert);
          }
        }

        window.onerror = function(message, source, lineno, colno, error) {
          var msg = message + '\\nFonte: ' + source + ' (Linha ' + lineno + ', Col ' + colno + ')';
          var stack = error && error.stack;
          showFatalError(msg, stack);
          return false;
        };

        window.onunhandledrejection = function(event) {
          var reason = event.reason;
          var msg = 'Promessa rejeitada não tratada: ' + (reason && reason.message || String(reason));
          var stack = reason && reason.stack;
          showFatalError(msg, stack);
        };
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SPA 404 Fix -->
    <script>
      // Redirect 404s to index for SPA routing
      (function() {
        try {
          var redirect = window.sessionStorage && window.sessionStorage.redirect;
          if (window.sessionStorage) {
            delete window.sessionStorage.redirect;
          }
          if (redirect && redirect !== location.href) {
            history.replaceState(null, null, redirect);
          }
        } catch (e) {
          console.warn("sessionStorage is blocked or disabled:", e);
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Mobile Debug Console -->
    <script>
      (function() {
        try {
          // Check if debug mode safely
          let hasDebug = window.location.search.includes('debug=true');
          try {
            if (typeof localStorage !== 'undefined' && localStorage.getItem('mobile-debug') === 'true') {
              hasDebug = true;
            }
          } catch (storageError) {}
          
          if (!hasDebug) return;
          
          // Save to localStorage safely
          try {
            if (typeof localStorage !== 'undefined') {
              localStorage.setItem('mobile-debug', 'true');
            }
          } catch (storageError) {}
          
          // Create overlay
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;bottom:0;left:0;right:0;max-height:50vh;background:rgba(0,0,0,0.95);color:#0f0;font:11px monospace;padding:10px;overflow-y:auto;z-index:999999;border-top:2px solid #0f0;';
          overlay.innerHTML = '<div style="position:sticky;top:0;background:#000;padding:5px;margin:-10px -10px 10px;border-bottom:1px solid #0f0;display:flex;justify-content:space-between;"><span style="font-weight:bold;">🔍 Debug Console</span><div><button onclick="document.getElementById(\'debugLogs\').innerHTML=\'\'" style="background:#0f0;color:#000;border:none;padding:3px 10px;border-radius:3px;font-weight:bold;margin-right:5px;">Clear</button><button onclick="try{if(typeof localStorage !== \'undefined\') { localStorage.setItem(\'mobile-debug\',\'false\'); }}catch(se){} this.parentElement.parentElement.parentElement.remove();" style="background:#f00;color:#fff;border:none;padding:3px 10px;border-radius:3px;font-weight:bold;">✕</button></div></div><div id="debugLogs"></div>';
          document.body.appendChild(overlay);
          
          // Add log function
          window.addDebugLog = function(msg, color) {
            const logs = document.getElementById('debugLogs');
            if (!logs) return;
            const entry = document.createElement('div');
            entry.style.cssText = 'padding:3px 0;border-bottom:1px solid #333;color:' + (color || '#0f0') + ';word-break:break-word;';
            entry.textContent = '[' + new Date().toLocaleTimeString('pt-BR') + '] ' + msg;
            logs.appendChild(entry);
            overlay.scrollTop = overlay.scrollHeight;
          };
          
          // Intercept console
          const ol = console.log, oe = console.error, ow = console.warn;
          console.log = function() { ol.apply(console, arguments); window.addDebugLog(Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '), '#0f0'); };
          console.error = function() { oe.apply(console, arguments); window.addDebugLog('❌ ' + Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '), '#f00'); };
          console.warn = function() { ow.apply(console, arguments); window.addDebugLog('⚠️ ' + Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '), '#fa0'); };
          
          console.log('🚀 Mobile Debug Console ativado!');
        } catch (e) {
          console.warn('Debug console disabled or storage inaccessible:', e);
        }
      })();
    </script>
  </body>
</html>
