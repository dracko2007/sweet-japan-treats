<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Preconnect: aquece a conexão com Firestore antes do JS carregar -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <script src="/init.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA: iOS / Safari -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Japan Express" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />

    <!-- PWA: Theme color (Android Chrome toolbar) -->
    <meta name="theme-color" content="#f97316" />
    <meta name="msapplication-TileColor" content="#f97316" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <title>Japan Express - Importados do Japão</title>
    <meta name="description" content="Compre produtos originais importados do Japão: cosméticos, doces, acessórios e papelaria, com envio rápido e seguro." />
    <meta name="author" content="Japan Express" />

    <meta property="og:title" content="Japan Express - Importados do Japão" />
    <meta property="og:description" content="Produtos originais do Japão entregues com cuidado. Cosméticos, doces e muito mais." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <link rel="canonical" href="https://japanexpress-store.com/" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
